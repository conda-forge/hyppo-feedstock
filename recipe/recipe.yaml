schema_version: 1

context:
  name: hyppo
  version: 0.5.2

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/neurodata/hyppo/archive/v${{ version }}.tar.gz
  sha256: 87d804c1c1d26a6249709366c809ccf32af1c3427e4c063028d7b53bb0983710

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - pandas >=2.2.3
    - patsy >=0.5.1
    - statsmodels >=0.14.1
    - python >=${{ python_min }}
    - numpy >=1.17
    - scipy >=1.4.0
    - numba >=0.46
    - scikit-learn >=0.19.1
    - autograd >=1.3
    - future >=1.0.0

tests:
  - python:
      imports:
        - hyppo
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: A comprehensive independence testing package
  license: MIT
  license_file: LICENSE.md
  homepage: https://hyppo.neurodata.io/
  repository: https://github.com/neurodata/hyppo

extra:
  recipe-maintainers:
    - thewchan
    - jan-janssen
